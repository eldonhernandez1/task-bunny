<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Bunny</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2322223B'/><path d='M8 16 L14 22 L24 10' stroke='%23C9ADA7' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Agu+Display&family=Unkempt:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark:    #22223B;
      --slate:   #4A4E69;
      --lavender:#9A8C98;
      --rose:    #C9ADA7;
      --cream:   #F2E9E4;

      --bg-page:    var(--cream);
      --bg-card:    #ffffff;
      --bg-input:   var(--cream);
      --text-main:  var(--dark);
      --text-muted: var(--lavender);
      --border:     var(--rose);
      --divider:    var(--cream);
      --btn-bg:     var(--dark);
      --btn-text:   var(--cream);
      --btn-hover:  var(--slate);
    }

    [data-theme="dark"] {
      --bg-page:    var(--dark);
      --bg-card:    #2E2E4A;
      --bg-input:   #1e1e35;
      --text-main:  var(--cream);
      --text-muted: var(--lavender);
      --border:     var(--slate);
      --divider:    #3a3a5c;
      --btn-bg:     var(--slate);
      --btn-text:   var(--cream);
      --btn-hover:  var(--lavender);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Unkempt', cursive;
      background: var(--bg-page);
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
      transition: background 0.3s;
    }

    .app {
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(34,34,59,0.12);
      padding: 32px;
      width: 100%;
      max-width: 520px;
      height: fit-content;
      transition: background 0.3s;
    }

    /* ── Hero ── */
    .hero {
      margin: -32px -32px 28px -32px;
      padding: 24px 32px 0 32px;
      background: linear-gradient(135deg, #22223B 0%, #4A4E69 100%);
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 0%, rgba(201,173,167,0.15) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-text {
      padding-bottom: 26px;
      flex: 1;
      position: relative;
    }

    .hero-text h1 {
      font-family: 'Agu Display', cursive;
      font-size: 2rem;
      color: var(--cream);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .hero-text p {
      font-size: 0.88rem;
      color: var(--lavender);
      margin-top: 6px;
    }

    .hero-art {
      width: 155px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      position: relative;
    }

    .hero-art svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Theme toggle (floats in hero top-right) ── */
    .theme-toggle {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(242,233,228,0.28);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cream);
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
      z-index: 1;
    }

    .theme-toggle:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(242,233,228,0.55);
    }

    .theme-toggle svg { display: block; }

    /* ── Input ── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      color: var(--text-main);
      background: var(--bg-input);
      transition: border-color 0.2s, background 0.3s, color 0.3s;
    }

    .input-row input::placeholder { color: var(--text-muted); }
    .input-row input:focus { border-color: var(--slate); background: var(--bg-card); }

    .input-row button {
      padding: 12px 20px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: var(--btn-hover); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 6px 14px;
      border: 2px solid var(--border);
      background: transparent;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--slate);
      transition: all 0.2s;
    }

    .filters button.active {
      background: var(--btn-bg);
      border-color: var(--btn-bg);
      color: var(--btn-text);
    }

    /* ── Task list ── */
    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-bottom: 1px solid var(--divider);
      animation: fadeIn 0.2s ease;
    }

    li:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--slate);
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 1rem;
      color: var(--text-main);
      word-break: break-word;
      transition: color 0.3s;
    }

    .task-text.done {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--rose);
      font-size: 1.1rem;
      line-height: 1;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--slate); }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 32px 0;
      font-size: 0.95rem;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--slate);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }

    .clear-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="app">

    <!-- Hero -->
    <div class="hero">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode" aria-label="Toggle dark/light mode"></button>

      <div class="hero-text">
        <h1>Task Bunny</h1>
        <p>Stay on track, one hop at a time.</p>
      </div>

      <div class="hero-art">
        <!-- Bunny holding a clipboard SVG -->
        <svg viewBox="0 0 240 230" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Shadow -->
          <ellipse cx="100" cy="223" rx="58" ry="7" fill="rgba(34,34,59,0.18)"/>

          <!-- Tail -->
          <circle cx="38" cy="168" r="14" fill="#ffffff" stroke="#C9ADA7" stroke-width="1.5"/>

          <!-- Body -->
          <ellipse cx="100" cy="160" rx="52" ry="55" fill="#F2E9E4" stroke="#22223B" stroke-width="2.5"/>

          <!-- Left ear -->
          <ellipse cx="70" cy="38" rx="15" ry="38" fill="#F2E9E4" stroke="#22223B" stroke-width="2.5"/>
          <ellipse cx="70" cy="38" rx="9" ry="29" fill="#C9ADA7"/>

          <!-- Right ear -->
          <ellipse cx="130" cy="38" rx="15" ry="38" fill="#F2E9E4" stroke="#22223B" stroke-width="2.5"/>
          <ellipse cx="130" cy="38" rx="9" ry="29" fill="#C9ADA7"/>

          <!-- Head -->
          <circle cx="100" cy="97" r="40" fill="#F2E9E4" stroke="#22223B" stroke-width="2.5"/>

          <!-- Eyes -->
          <circle cx="86" cy="91" r="5.5" fill="#22223B"/>
          <circle cx="114" cy="91" r="5.5" fill="#22223B"/>
          <circle cx="88" cy="89" r="2" fill="white"/>
          <circle cx="116" cy="89" r="2" fill="white"/>

          <!-- Nose -->
          <ellipse cx="100" cy="104" rx="4.5" ry="3.5" fill="#C9ADA7"/>

          <!-- Mouth -->
          <path d="M93 109 Q100 116 107 109" fill="none" stroke="#22223B" stroke-width="2" stroke-linecap="round"/>

          <!-- Left arm -->
          <path d="M52 150 C30 137 28 117 42 109" stroke="#F2E9E4" stroke-width="14" stroke-linecap="round" fill="none"/>
          <path d="M52 150 C30 137 28 117 42 109" stroke="#22223B" stroke-width="2.5" stroke-linecap="round" fill="none"/>

          <!-- Right arm (holding clipboard) -->
          <path d="M148 150 C168 137 170 117 158 107" stroke="#F2E9E4" stroke-width="14" stroke-linecap="round" fill="none"/>
          <path d="M148 150 C168 137 170 117 158 107" stroke="#22223B" stroke-width="2.5" stroke-linecap="round" fill="none"/>

          <!-- Clipboard board -->
          <rect x="156" y="88" width="46" height="58" rx="4" fill="white" stroke="#4A4E69" stroke-width="2"/>
          <!-- Clipboard clip -->
          <rect x="170" y="83" width="18" height="11" rx="4" fill="#4A4E69"/>
          <rect x="174" y="85" width="10" height="5" rx="2" fill="#9A8C98"/>

          <!-- Checklist row 1 – done -->
          <rect x="163" y="105" width="9" height="9" rx="2" fill="none" stroke="#9A8C98" stroke-width="1.5"/>
          <path d="M164.5 109.5 L166.5 111.5 L170.5 106.5" fill="none" stroke="#4A4E69" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="176" y1="110" x2="196" y2="110" stroke="#22223B" stroke-width="2" stroke-linecap="round"/>

          <!-- Checklist row 2 – done -->
          <rect x="163" y="119" width="9" height="9" rx="2" fill="none" stroke="#9A8C98" stroke-width="1.5"/>
          <path d="M164.5 123.5 L166.5 125.5 L170.5 120.5" fill="none" stroke="#4A4E69" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="176" y1="124" x2="196" y2="124" stroke="#22223B" stroke-width="2" stroke-linecap="round"/>

          <!-- Checklist row 3 – pending -->
          <rect x="163" y="133" width="9" height="9" rx="2" fill="none" stroke="#9A8C98" stroke-width="1.5"/>
          <line x1="176" y1="138" x2="196" y2="138" stroke="#C9ADA7" stroke-width="2" stroke-linecap="round"/>

          <!-- Feet -->
          <ellipse cx="74"  cy="207" rx="25" ry="12" fill="#F2E9E4" stroke="#22223B" stroke-width="2.5"/>
          <ellipse cx="122" cy="207" rx="25" ry="12" fill="#F2E9E4" stroke="#22223B" stroke-width="2.5"/>
        </svg>
      </div>
    </div>
    <!-- /Hero -->

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="200">
      <button onclick="addTask()">Add</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">All</button>
      <button onclick="setFilter('active', this)">Active</button>
      <button onclick="setFilter('done', this)">Done</button>
    </div>

    <ul id="taskList"></ul>
    <p class="empty" id="emptyMsg" style="display:none">Look at you! No tasks here.</p>

    <div class="footer">
      <span id="countLabel"></span>
      <button class="clear-btn" onclick="clearDone()">Clear completed</button>
    </div>
  </div>

  <script>
    const SUN  = `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
    const MOON = `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let filter = 'all';

    const html      = document.documentElement;
    const toggleBtn = document.querySelector('.theme-toggle');

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      toggleBtn.innerHTML = theme === 'dark' ? SUN : MOON;
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    applyTheme(localStorage.getItem('theme') || 'light');

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function render() {
      const list = document.getElementById('taskList');
      const visible = tasks.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      list.innerHTML = '';
      visible.forEach(task => {
        const li   = document.createElement('li');
        const cb   = document.createElement('input');
        cb.type    = 'checkbox';
        cb.checked = task.done;
        cb.onchange = () => { task.done = cb.checked; save(); render(); };

        const span       = document.createElement('span');
        span.className   = 'task-text' + (task.done ? ' done' : '');
        span.textContent = task.text;

        const del       = document.createElement('button');
        del.className   = 'delete-btn';
        del.textContent = '✕';
        del.title       = 'Delete';
        del.onclick     = () => { tasks = tasks.filter(t => t !== task); save(); render(); };

        li.append(cb, span, del);
        list.appendChild(li);
      });

      const active = tasks.filter(t => !t.done).length;
      document.getElementById('countLabel').textContent =
        `${active} task${active !== 1 ? 's' : ''} remaining`;
      document.getElementById('emptyMsg').style.display =
        visible.length === 0 ? 'block' : 'none';
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text  = input.value.trim();
      if (!text) return;
      tasks.push({ text, done: false });
      input.value = '';
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    }

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
